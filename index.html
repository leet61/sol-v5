<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status Monitor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 0 auto;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .info-group {
            margin: 15px 0;
        }
        .label {
            font-weight: bold;
            color: #7f8c8d;
        }
        .value {
            font-family: monospace;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Device Telemetry</h2>
    
    <div class="info-group">
        <span class="label">PC Name:</span> 
        <span id="pcname" class="value">No data</span>
    </div>
    
    <div class="info-group">
        <span class="label">Operating System:</span> 
        <span id="os" class="value">No data</span>
    </div>
    
    <div class="info-group">
        <span class="label">Status:</span> 
        <span id="status" class="value">No data</span>
    </div>
</div>

<script>
    // Parse query parameters from the URL
    const urlParams = new URLSearchParams(window.location.search);
    
    const pcNameParam = urlParams.get('pcname');
    const osParam = urlParams.get('os');
    const statusParam = urlParams.get('status');

    // Update the DOM if parameters exist
    if (pcNameParam) document.getElementById('pcname').textContent = pcNameParam;
    if (osParam) document.getElementById('os').textContent = osParam;
    if (statusParam) {
        const statusElement = document.getElementById('status');
        statusElement.textContent = statusParam.toUpperCase();
        if (statusParam.toLowerCase() === 'running') {
            statusElement.style.color = '#27ae60';
        }
    }
</script>

</body>
</html>
